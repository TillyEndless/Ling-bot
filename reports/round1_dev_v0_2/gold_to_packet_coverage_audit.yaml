benchmark_version_under_audit: round1_dev_v0.1
target_revision: round1_dev_v0.2
audit_scope: approved dev gold annotations versus B0-facing model_input_packet.md files
decision_rule: "Revise packets only where gold-relevant evidence is absent or materially incomplete in the actual model input; do not infer insufficiency merely from B0 omissions."

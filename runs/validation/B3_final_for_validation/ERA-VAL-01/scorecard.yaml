findings:
- severity: minor
  dimension: comparison_fairness
  description: The output identifies baseline comparability needs but cannot deeply normalize comparisons because the packet
    omits exact baselines and metrics. This is a limitation of the task materials rather than a serious output flaw.
  evidence: Gold notes ambiguities requiring human review for exact page, section, table, and figure locations, and expects
    baseline selection and metric appropriateness to be audited from the packet.
- severity: minor
  dimension: efficiency
  description: The explicit evidence-burden labels improve rigor but add some verbosity compared with B1. The added structure
    is useful, so this is only a minor efficiency cost.
  evidence: The output repeats DIRECT_PACKET_EVIDENCE, LIMITED_CRITIQUE, and UNSUPPORTED_OR_NEEDS_EXTERNAL_REVIEW labels across
    sections.
summary: B3 is the best calibrated variant. It explicitly inventories supplied sources, separates direct packet evidence,
  within-packet synthesis, limited critique, and unsupported claims, and fully covers contamination, saturation, prompt protocol,
  baselines, uncertainty, leakage, and claim scope. It avoids external facts and does not invent numbers.
